name: Déployer sur GitHub Pages

# Se déclenche à chaque envoi (push) sur la branche principale, ou manuellement.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests
        run: npm test

      - name: Bâtir le site (dossier dist/)
        run: npm run build

      - name: Préparer l'artéfact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
